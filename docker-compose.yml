version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: collabhub-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: collabhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
      PGTZ: UTC

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: